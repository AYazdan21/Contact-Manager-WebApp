server {
    listen 80;
    listen [::]:80;
    server_name <your-domain.com>; # Replace with your domain or IP

    # Redirect all HTTP requests to HTTPS (uncomment after installing SSL certificates)
    # return 301 https://$host$request_uri;

    # Frontend Static Files
    root /var/www/contact-manager/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API Reverse Proxy
    location /api/ {
        # The trailing slash is crucial. It strips "/api/" from the URI before passing it to FastAPI.
        # e.g., /api/auth/login becomes /auth/login
        proxy_pass http://127.0.0.1:8000/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for real-time response logs if needed
        proxy_buffering off;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
}
